version: '3.8'

services:
  db:
    image: postgres:13
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: CatalogDb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - app-network

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tasktracker"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  app:
    build: maxkedroff2005/catalogservice-backend
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=CatalogDb;Username=postgres;Password=postgres"
    ports:
      - "5000:8080"  # HTTP
      - "5001:443"   # HTTPS

    depends_on:
      db:
        condition: service_healthy

    networks:
      - app-network

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge